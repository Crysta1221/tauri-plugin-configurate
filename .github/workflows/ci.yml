name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test

      - name: cargo clippy (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: cargo clippy -- -D warnings

      - name: cargo clippy (Windows - allow all)
        if: matrix.os == 'windows-latest'
        run: cargo clippy

      - name: bun install
        run: bun install

      - name: bun run build
        run: bun run build

      - name: bun test
        run: bun test guest-js/*.test.ts
